<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Scaffold AI agent-friendly documentation into any repository with a single command"
    />
    <title>create-ai-agents-docs</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&display=swap');

      :root {
        --bg: #ffffff;
        --bg-code: #f4f5f7;
        --bg-code-block: #f4f5f7;
        --border: #e9e9ea;
        --text: #414756;
        --text-muted: #5e687e;
        --link: #0a7ea4;
        --link-hover: #2496bb;
        --heading-border: #e9e9ea;
        --table-row-alt: #f4f5f7;
        --sidebar-bg: #f4f5f7;
        --accent: #0a7ea4;
        --header-height: 5rem;
        --footer-height: 3rem;
        --sidebar-width: 280px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #191b20;
          --bg-code: #23272f;
          --bg-code-block: #23272f;
          --border: #343843;
          --text: #f6f7f9;
          --text-muted: #99a1b3;
          --link: #58c4dc;
          --link-hover: #2eabc7;
          --heading-border: #343843;
          --table-row-alt: #23272f;
          --sidebar-bg: #23272f;
          --accent: #58c4dc;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :focus-visible {
        outline: 2px solid var(--link);
        outline-offset: 4px;
        border-radius: 2px;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          'Atkinson Hyperlegible Next',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Helvetica,
          Arial,
          sans-serif;
        font-size: 16px;
        line-height: 1.7;
        padding-bottom: var(--footer-height);
      }

      a {
        color: var(--link);
        text-decoration: none;
      }

      a:hover {
        color: var(--link-hover);
        text-decoration: underline;
      }

      /* ── Header ── */

      .site-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        height: var(--header-height);
      }

      .header-inner {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
      }

      .site-logo {
        margin: 0;
        font-family: 'Atkinson Hyperlegible Mono', ui-monospace, monospace;
        font-weight: 700;
        font-size: 1.75rem;
        letter-spacing: -0.02em;
      }

      .site-logo a {
        display: flex;
        text-decoration: none;
        align-items: center;
        gap: 0.5rem;
        font-weight: 300;
      }

      .site-logo img {
        height: 2.5rem;
        width: auto;
        display: block;
      }

      .header-links {
        display: flex;
        gap: 0.75rem;
        align-items: center;
      }

      .header-links a {
        display: flex;
        align-items: center;
        color: var(--text-muted);
        transition: color 0.15s;
      }

      .header-links a:hover {
        color: var(--accent);
        text-decoration: none;
      }

      .header-links svg {
        width: 1.75rem;
        height: 1.75rem;
        fill: currentColor;
      }

      /* ── Layout ── */

      .layout {
        display: flex;
      }

      .sidebar {
        width: var(--sidebar-width);
        flex-shrink: 0;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        padding: 1.5rem 1rem;
        position: sticky;
        top: var(--header-height);
        max-height: calc(100vh - var(--header-height) - var(--footer-height));
        overflow-y: auto;
      }

      @media (min-width: 1200px) {
        .sidebar {
          position: fixed;
          top: var(--header-height);
          left: 0;
          height: calc(100vh - var(--header-height) - var(--footer-height));
          overflow-y: auto;
        }

        .content-wrapper {
          padding-left: var(--sidebar-width);
        }
      }

      @media (max-width: 767px) {
        .sidebar {
          display: none;
        }
      }

      .sidebar-title {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin: 0 0 0.75rem 0.25rem;
      }

      #toc {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      #toc li {
        margin: 0;
        padding: 0;
      }

      #toc a {
        display: block;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        color: var(--text);
        font-size: 0.875rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #toc a:focus-visible {
        outline-offset: 1px;
      }

      #toc a:hover {
        background: var(--border);
        text-decoration: none;
      }

      #toc .toc-h2 {
        padding-left: 0.5rem;
      }

      #toc .toc-h3 {
        padding-left: 1.25rem;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      /* ── Content wrapper ── */

      .content-wrapper {
        flex: 1;
        min-width: 0;
      }

      /* ── Main content ── */

      .content {
        padding: 1.5rem 3rem 4rem;
        max-width: 860px;
        margin: 0 auto;
      }

      /* ── Headings ── */

      .content h2,
      .content h3,
      .content h4 {
        margin-top: 1.75em;
        margin-bottom: 0.5em;
        line-height: 1.3;
        font-weight: 600;
        scroll-margin-top: calc(var(--header-height) + 1rem);
      }

      .heading-anchor {
        margin-left: 0.4em;
        opacity: 0;
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 400;
        transition: opacity 0.15s;
      }

      .content h2:hover .heading-anchor,
      .content h3:hover .heading-anchor {
        opacity: 1;
      }

      .heading-anchor:focus-visible {
        opacity: 1;
      }

      .content h2 {
        font-size: 1.4rem;
        border-bottom: 1px solid var(--heading-border);
        padding-bottom: 0.3em;
      }

      .content h3 {
        font-size: 1.1rem;
      }

      /* ── Code ── */

      .content code {
        background: var(--bg-code);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.1em 0.4em;
        font-size: 0.875em;
        font-family:
          'Atkinson Hyperlegible Mono', ui-monospace, 'SFMono-Regular', Consolas, 'Liberation Mono',
          Menlo, monospace;
      }

      .content pre {
        background: var(--bg-code-block);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1rem 1.25rem;
        overflow-x: auto;
        line-height: 1.5;
      }

      .content pre code {
        background: none;
        border: none;
        padding: 0;
        font-size: 0.875em;
      }

      /* ── Tables ── */

      .content table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
        margin: 1.25rem 0;
        display: block;
        overflow-x: auto;
      }

      .content th,
      .content td {
        border: 1px solid var(--border);
        padding: 0.5rem 0.75rem;
        text-align: left;
      }

      .content th {
        background: var(--bg-code);
        font-weight: 600;
      }

      .content tr:nth-child(even) td {
        background: var(--table-row-alt);
      }

      /* ── Blockquote / HR / Lists ── */

      .content blockquote {
        margin: 1rem 0;
        padding: 0.5rem 1rem;
        border-left: 4px solid var(--border);
        color: var(--text-muted);
      }

      .content hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 2rem 0;
      }

      .content ul,
      .content ol {
        padding-left: 1.75rem;
      }

      .content li + li {
        margin-top: 0.25rem;
      }

      /* ── Footer ── */

      .site-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        height: var(--footer-height);
        background: var(--bg);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.875rem;
        color: var(--text-muted);
      }

      .site-footer a {
        color: var(--text-muted);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .site-footer a:hover {
        color: var(--accent);
        text-decoration: none;
      }

      /* ── Responsive ── */

      @media (max-width: 767px) {
        .content {
          padding: 1.25rem 1.25rem 3rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <h1 class="site-logo">
          <a href="#">
            <picture>
              <source srcset="logo-dark.png" media="(prefers-color-scheme: dark)" />
              <img src="logo-light.png" alt="create-ai-agents-docs" />
            </picture>
          </a>
        </h1>
        <nav class="header-links" aria-label="External links">
          <a
            href="https://github.com/bence-toth/create-ai-agents-docs"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="GitHub repository"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"
              />
            </svg>
          </a>
          <a
            href="https://www.npmjs.com/package/create-ai-agents-docs"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="npm package"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M1.763 0C.786 0 0 .786 0 1.763v20.474C0 23.214.786 24 1.763 24h20.474c.977 0 1.763-.786 1.763-1.763V1.763C24 .786 23.214 0 22.237 0zM5.13 5.323l13.837.019-.009 13.836h-3.464l.01-10.382h-3.456L12.04 19.17H5.113z"
              />
            </svg>
          </a>
        </nav>
      </div>
    </header>
    <div class="layout">
      <nav class="sidebar" aria-label="Table of contents">
        <p class="sidebar-title">Contents</p>
        <ul id="toc"></ul>
      </nav>
      <div class="content-wrapper">
        <main class="content" id="main-content">
          <!-- CONTENT -->
        </main>
      </div>
    </div>
    <footer class="site-footer">
      Made by&nbsp;
      <a href="https://www.linkedin.com/in/bence-a-toth/" target="_blank" rel="noopener noreferrer"
        >Bence A. Tóth</a
      >
    </footer>

    <script>
      ;(function () {
        const content = document.getElementById('main-content')
        const toc = document.getElementById('toc')

        const h1 = content.querySelector('h1')
        if (h1) h1.remove()

        const headings = content.querySelectorAll('h2, h3')

        headings.forEach(function (h, i) {
          if (!h.id) {
            h.id =
              'heading-' +
              i +
              '-' +
              h.textContent
                .toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
          }
          const anchor = document.createElement('a')
          anchor.href = '#' + h.id
          anchor.className = 'heading-anchor'
          anchor.setAttribute('aria-hidden', 'true')
          anchor.textContent = '#'
          h.appendChild(anchor)

          const li = document.createElement('li')
          const a = document.createElement('a')
          a.href = '#' + h.id
          a.textContent = h.textContent.replace(/#$/, '').trimEnd()
          a.className = 'toc-' + h.tagName.toLowerCase()
          li.appendChild(a)
          toc.appendChild(li)
        })

        const observer = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (entry) {
              const link = toc.querySelector('a[href="#' + entry.target.id + '"]')
              if (!link) return
              if (entry.isIntersecting) {
                toc.querySelectorAll('a').forEach(function (a) {
                  a.style.fontWeight = ''
                  a.style.color = ''
                })
                link.style.fontWeight = '600'
                link.style.color = 'var(--accent)'
              }
            })
          },
          { rootMargin: '0px 0px -80% 0px' },
        )

        headings.forEach(function (h) {
          observer.observe(h)
        })
      })()
    </script>
  </body>
</html>
